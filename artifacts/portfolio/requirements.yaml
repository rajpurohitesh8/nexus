packages:
  "framer-motion": "For creamy animations, scroll reveals, and dynamic hover effects"
  "clsx": "Utility for conditionally joining classNames"
  "tailwind-merge": "Utility for merging tailwind classes without conflicts"
  "react-hook-form": "For robust contact form state management"
  "@hookform/resolvers": "Zod resolver for react-hook-form"
  "zod": "Schema validation for the contact form"

images:
