  - path: "artifacts/portfolio/public/images/agency-office.png"
    description: "Ultra-modern, high-tech agency workspace, sleek minimal desks, multiple ultrawide monitors showing code, dark cinematic environment with subtle electric blue and purple accent lights, highly sophisticated"
    aspect_ratio: "16:9"
  - path: "artifacts/portfolio/public/images/project-fintech.png"
    description: "Abstract representation of a futuristic fintech application dashboard, floating UI elements, dark mode, glowing charts and numbers, metallic greys and neon cyan highlights"
    aspect_ratio: "4:3"
  - path: "artifacts/portfolio/public/images/project-ai.png"
    description: "Abstract visual of artificial intelligence brain or neural network, intricate glowing connections, dark deep space background, electric purple and magenta accents, highly detailed concept art"
    aspect_ratio: "4:3"
  - path: "artifacts/portfolio/public/images/project-health.png"
    description: "Futuristic medical tech interface abstraction, glowing DNA helix or biometric data rings, clean minimal aesthetics, deep blue and bright white colors"
